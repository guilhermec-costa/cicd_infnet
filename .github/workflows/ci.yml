name: CI Pipeline

on:
  push:
    branches:
      - master 
    paths:
      - 'src/**'
  pull_request:
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      run_tests:
        type: boolean
        default: true
        description: 'Run tests'
      run_lint:
        type: boolean
        default: true
        description: 'Run lint'

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

  lint-and-test:
    needs: checkout
    uses: ./.github/workflows/lint-and-test.yml
    with:
      run_tests: ${{ github.event.inputs.run_tests || true }}
      run_lint: ${{ github.event.inputs.run_lint || true }}

  build:
    needs: checkout
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build with Maven
        run: mvn clean install

  package:
    needs: [build, lint-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'
      - name: Package JAR
        run: mvn package -DskipTests

  deploy:
    needs: [build, lint-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy message
        run: echo "Deploy realizado com sucesso"
